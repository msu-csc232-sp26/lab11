name: Classroom Autograder

on:
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: classroom-${{ github.repository }}
  cancel-in-progress: false

jobs:
  autograde:
    runs-on: ubuntu-latest

    env:
      # Instructor-controlled deadline (UTC, ISO-8601)
      DUE_AT: "2026-04-01T23:59:00"
      # Timestamp of the submission triggering the run
      SUBMITTED_AT: ${{ github.event.head_commit.timestamp }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v5

      # ------------------------------------------------------------
      # Protect against burst grading
      # ------------------------------------------------------------
      - name: Throttle
        run: sleep 15

      # ------------------------------------------------------------
      # Install build dependencies
      # ------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            libgtest-dev

      # ------------------------------------------------------------
      # Configure (ALL TASKS ENABLED)
      # ------------------------------------------------------------
      - name: Configure
        run: cmake --preset all-tasks

      # ------------------------------------------------------------
      # Build
      # ------------------------------------------------------------
      - name: Build
        run: cmake --build build/all-tasks

      # ------------------------------------------------------------
      # Run tests (single authoritative run)
      # ------------------------------------------------------------
      - name: Run tests
        run: |
          mkdir -p results
          ctest --test-dir build/all-tasks \
                --output-on-failure \
                --test-output-json "${GITHUB_WORKSPACE}results/all-tasks.xml" || true

      # ------------------------------------------------------------
      # Grade (JSON-driven)
      # ------------------------------------------------------------
      - name: Grade
        run: python3 grading/grade.py

      # ------------------------------------------------------------
      # Upload grading result (audit trail)
      # ------------------------------------------------------------
      - name: Upload grading result
        uses: actions/upload-artifact@v4
        with:
          name: grading-result
          path: grading/result.json
