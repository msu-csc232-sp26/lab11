name: Classroom Autograder

on:
  push:
    branches:
      - develop
    tags:
      - "task*-release"
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: classroom-${{ github.repository }}
  cancel-in-progress: false

jobs:
  autograde:
    runs-on: ubuntu-latest

    env:
      # Instructor-controlled deadline (Central Time with offset!)
      DUE_AT: "2026-04-01T23:59:00-05:00"

      # Timestamp of the commit being graded
      SUBMITTED_AT: ${{ github.event.head_commit.timestamp }}

    steps:
      # ------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v5

      # ------------------------------------------------------------
      # Determine CURRENT_TASK from release tags
      # ------------------------------------------------------------
      - name: Determine current task
        run: |
          ref="${GITHUB_REF_NAME}"

          case "$ref" in
            task1-release)
              echo "CURRENT_TASK=1" >> "$GITHUB_ENV"
              ;;
            task2-release)
              echo "CURRENT_TASK=2" >> "$GITHUB_ENV"
              ;;
            task3-release)
              echo "CURRENT_TASK=3" >> "$GITHUB_ENV"
              ;;
            *)
              # Default: highest released task
              if git tag --list "task*-release" | grep -q task3-release; then
                echo "CURRENT_TASK=3" >> "$GITHUB_ENV"
              elif git tag --list "task*-release" | grep -q task2-release; then
                echo "CURRENT_TASK=2" >> "$GITHUB_ENV"
              elif git tag --list "task*-release" | grep -q task1-release; then
                echo "CURRENT_TASK=1" >> "$GITHUB_ENV"
              else
                echo "CURRENT_TASK=0" >> "$GITHUB_ENV"
              fi
              ;;
          esac

          echo "CURRENT_TASK = ${CURRENT_TASK}"

      # ------------------------------------------------------------
      # Throttle (Classroom safety)
      # ------------------------------------------------------------
      - name: Throttle
        run: sleep 15

      # ------------------------------------------------------------
      # Install build dependencies
      # ------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            clang \
            libgtest-dev

      # ------------------------------------------------------------
      # Build & test only required task presets
      # ------------------------------------------------------------
      - name: Build and test current task
        run: |
          mkdir -p results

          if [ "$CURRENT_TASK" -eq 1 ]; then
            PRESETS="task1"
          elif [ "$CURRENT_TASK" -eq 2 ]; then
            PRESETS="task1 task1-2"
          elif [ "$CURRENT_TASK" -eq 3 ]; then
            PRESETS="task1 task1-2 task1-3"
          else
            echo "All tests disabled! CURRENT_TASK: $CURRENT_TASK"
            PRESETS=""
          fi

          for preset in $PRESETS; do
            echo ""
            echo "===== Grading preset: $preset ====="
            cmake --preset "$preset"
            cmake --build "build/$preset"
            ctest --test-dir "build/$preset" \
                  --output-on-failure \
                  --output-junit "${GITHUB_WORKSPACE}/results/$preset.xml" || true
          done

      # ------------------------------------------------------------
      # Grade (partial credit allowed)
      # ------------------------------------------------------------
      - name: Grade
        run: python3 grading/grade.py

      # ------------------------------------------------------------
      # Upload grading result
      # ------------------------------------------------------------
      - name: Upload grading result
        uses: actions/upload-artifact@v5
        with:
          name: grading-result
          path: grading/result.json
